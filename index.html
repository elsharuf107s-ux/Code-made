<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Infinite Clash: Tactical</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;700;900&display=swap" rel="stylesheet">
<style>
/* Base Styles */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;user-select:none;touch-action:manipulation;background:#05060f;color:#dde4ff;font-family:'Rajdhani',sans-serif;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 90% 50% at 50% -5%,#2d1b6940,transparent),radial-gradient(ellipse 60% 35% at 15% 105%,#06b6d420,transparent);pointer-events:none;z-index:0;}
#game{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column}

/* Screens */
.screen{display:none;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;position:absolute;top:0;left:0;background:#05060f;}
.screen.active{display:flex}

/* Buttons & Text */
.mt{font-family:'Exo 2',sans-serif;font-weight:900;font-size:2.5rem;background:linear-gradient(130deg,#c4b5fd,#38bdf8,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;text-align:center;margin-bottom:10px;}
.mbtn{background:linear-gradient(135deg,#4f0ba8,#7c3aed);color:#fff;border:none;border-radius:8px;padding:12px 30px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.1rem;cursor:pointer;margin:5px;width:80%;max-width:300px;box-shadow:0 4px 15px #7c3aed44;}
.mbtn:active{transform:scale(.95)}
.mbtn.sec{background:linear-gradient(135deg,#0c1a3a,#1251a0);box-shadow:0 4px 15px #38bdf833}
input.acct-input{padding:12px;border-radius:8px;border:1px solid #7c3aed;background:#000;color:#fff;font-family:'Rajdhani',sans-serif;font-size:1.2rem;text-align:center;width:80%;max-width:300px;margin-bottom:15px;}

/* Game UI Elements */
#screen-game{justify-content:space-between;background:none;}
.top-bar, .bottom-bar{width:100%;background:rgba(0,0,0,0.8);padding:5px 10px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;}
.bottom-bar{border-top:1px solid #333;border-bottom:none;overflow-x:auto;}
.hp-container{width:40%;background:#222;height:12px;border-radius:6px;overflow:hidden;position:relative;}
.hp-fill{height:100%;background:linear-gradient(90deg,#dc2626,#f97316);transition:width 0.3s;}
.hp-fill.player{background:linear-gradient(90deg,#16a34a,#22d3ee);}
.hp-text{position:absolute;width:100%;text-align:center;top:0;font-size:0.6rem;line-height:12px;font-weight:bold;color:#fff;}

/* Battle Field */
#field{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;width:100%;padding:5px;}
.row{display:flex;justify-content:center;gap:4px;width:100%;}
.slot{width:65px;height:85px;border:1.5px dashed #1a2540;border-radius:8px;position:relative;display:flex;align-items:center;justify-content:center;}
.slot.front{border-color:#4c1d95;}
.slot.back{border-color:#1e293b;height:65px;} /* Back row is slightly shorter visually */

/* Cards */
.card{width:100%;height:100%;background:#111;border:1px solid #4c1d95;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:2px;font-size:0.6rem;color:#fff;overflow:hidden;}
.card .title{font-weight:bold;font-size:0.5rem;text-align:center;line-height:1;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.card .icon{font-size:1.5rem;margin:auto;}
.card .stats{width:100%;display:flex;justify-content:space-between;font-size:0.5rem;color:#aaa;}
.card.hand-card{min-width:70px;height:95px;margin-right:5px;background:linear-gradient(160deg,#0f0322,#280966);}

/* Alerts & Toasts */
#logline{width:100%;text-align:center;font-size:0.8rem;color:#a78bfa;background:rgba(0,0,0,0.5);padding:4px;}
#toast-container{position:fixed;top:20%;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:5px;}
.toast{background:rgba(0,0,0,0.9);border:1px solid #7c3aed;padding:8px 15px;border-radius:8px;font-size:0.8rem;animation:fade 2s forwards;}
@keyframes fade{0%{opacity:0;transform:translateY(10px)} 10%{opacity:1;transform:translateY(0)} 90%{opacity:1} 100%{opacity:0}}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:200;}
.modal-overlay.active{display:flex;}
.modal-content{background:#0d1117;border:1px solid #7c3aed;border-radius:12px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;}
</style>
</head>
<body>
<div id="game">

<div id="screen-login" class="screen active">
    <div class="mt">INFINITE CLASH</div>
    <p style="margin-bottom:20px;color:#aaa;">Enter your username to load or create an account.</p>
    <input type="text" id="username-input" class="acct-input" placeholder="Username" />
    <button class="mbtn" onclick="login()">Login / Register</button>
</div>

<div id="screen-menu" class="screen">
    <div class="mt">INFINITE CLASH</div>
    <p id="welcome-msg" style="margin-bottom:20px;color:#38bdf8;"></p>
    <button class="mbtn" onclick="startGame()">▶ Start Battle</button>
    <button class="mbtn" onclick="openDeckBuilder()">🧭 Deck Builder</button>
    <button class="mbtn sec" onclick="logout()">Log Out</button>
</div>

<div id="screen-builder" class="screen">
    <div class="mt" style="font-size:1.8rem;">DECK BUILDER</div>
    <div style="display:flex;width:100%;height:60vh;padding:5px;gap:5px;">
        <div style="flex:1;background:#111;overflow-y:auto;padding:5px;border:1px solid #333;">
            <h4 style="text-align:center;color:#aaa;">Card Pool</h4>
            <div id="pool-list" style="display:flex;flex-direction:column;gap:5px;"></div>
        </div>
        <div style="flex:1;background:#111;overflow-y:auto;padding:5px;border:1px solid #333;">
            <h4 style="text-align:center;color:#a78bfa;">Your Deck (<span id="deck-count">0</span>)</h4>
            <div id="deck-list" style="display:flex;flex-direction:column;gap:5px;"></div>
        </div>
    </div>
    <button class="mbtn" onclick="saveDeck()">💾 Save & Back</button>
</div>

<div id="screen-game" class="screen">
    <div class="top-bar">
        <span style="color:#f87171">⚠ ENEMY (<span id="e-deck-count">20</span>)</span>
        <div class="hp-container"><div class="hp-fill" id="e-hp-fill"></div><div class="hp-text" id="e-hp-txt">6000/6000</div></div>
    </div>

    <div id="field">
        <div class="row" id="e-back">
            <div class="slot back" onclick="act('e','back',0)"></div>
            <div class="slot back" onclick="act('e','back',1)"></div>
            <div class="slot back" onclick="act('e','back',2)"></div>
            <div class="slot back" onclick="act('e','back',3)"></div>
        </div>
        <div class="row" id="e-front">
            <div class="slot front" onclick="act('e','front',0)"></div>
            <div class="slot front" onclick="act('e','front',1)"></div>
            <div class="slot front" onclick="act('e','front',2)"></div>
            <div class="slot front" onclick="act('e','front',3)"></div>
        </div>
        
        <div style="text-align:center;font-size:0.7rem;color:#4c1d95;letter-spacing:5px;">VS</div>

        <div class="row" id="p-front">
            <div class="slot front" onclick="act('p','front',0)"></div>
            <div class="slot front" onclick="act('p','front',1)"></div>
            <div class="slot front" onclick="act('p','front',2)"></div>
            <div class="slot front" onclick="act('p','front',3)"></div>
        </div>
        <div class="row" id="p-back">
            <div class="slot back" onclick="act('p','back',0)"></div>
            <div class="slot back" onclick="act('p','back',1)"></div>
            <div class="slot back" onclick="act('p','back',2)"></div>
            <div class="slot back" onclick="act('p','back',3)"></div>
        </div>
    </div>

    <div id="logline">Battle Start!</div>
    <div style="display:flex;width:100%;padding:5px;gap:5px;background:#000;">
        <button id="btn-main" class="mbtn" style="margin:0;flex:1;padding:8px;" onclick="progressTurn()">Draw Phase</button>
        <button class="mbtn sec" style="margin:0;width:80px;padding:8px;" onclick="showGraveyard()">Grave</button>
    </div>

    <div class="bottom-bar" id="p-hand" style="height:110px;justify-content:flex-start;"></div>

    <div class="top-bar" style="border-top:1px solid #333;border-bottom:none;">
        <span style="color:#86efac">🛡 YOU (<span id="p-deck-count">20</span>)</span>
        <div class="hp-container"><div class="hp-fill player" id="p-hp-fill"></div><div class="hp-text" id="p-hp-txt">8000/8000</div></div>
    </div>
</div>

<div id="modal-grave" class="modal-overlay" onclick="this.classList.remove('active')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:#a78bfa;text-align:center;margin-bottom:10px;">Graveyard & Banish</h3>
        <div id="grave-list" style="color:#aaa;font-size:0.8rem;line-height:1.5;"></div>
        <button class="mbtn" style="width:100%;margin-top:10px;" onclick="document.getElementById('modal-grave').classList.remove('active')">Close</button>
    </div>
</div>

<div id="toast-container"></div>

</div>

<script>
// --- DATABASE ---
const DB = {
    shadow_blade: {id:'shadow_blade', nm:'Shadow Blade', type:'warrior', atk:1500, hp:1500, ico:'🗡️', desc:'Standard front-line fighter.'},
    shield_bearer: {id:'shield_bearer', nm:'Shield Bearer', type:'warrior', atk:500, hp:2500, ico:'🛡️', desc:'High HP defender.'},
    void_mage: {id:'void_mage', nm:'Void Mage', type:'warrior', atk:1200, hp:800, ico:'🔮', desc:'Magic user.'},
    archer: {id:'archer', nm:'Elven Archer', type:'warrior', atk:1000, hp:1000, ico:'🏹', pierce:true, desc:'PIERCE: Can attack the Back Row even if the Front Row is occupied.'},
    dragon: {id:'dragon', nm:'Inferno Dragon', type:'warrior', atk:2200, hp:2000, ico:'🐉', desc:'Powerful beast.'},
    heal_spell: {id:'heal_spell', nm:'Healing Light', type:'spell', ico:'✨', desc:'Heal your hero for 1500 HP.'},
    fireball: {id:'fireball', nm:'Fireball', type:'spell', ico:'🔥', desc:'Deal 800 damage directly to the enemy.'}
};

// --- STATE ---
let currentUser = null;
let G = {};
let builderDeck = [];

// --- ACCOUNTS ---
function login() {
    const name = document.getElementById('username-input').value.trim();
    if(!name) return alert("Enter a username.");
    let accounts = JSON.parse(localStorage.getItem('ic_accounts')) || {};
    if(!accounts[name]) accounts[name] = { deck: Object.keys(DB).flatMap(k=>[k,k]).slice(0, 20) }; // default 20 cards
    currentUser = { name, data: accounts[name] };
    localStorage.setItem('ic_accounts', JSON.stringify(accounts));
    document.getElementById('welcome-msg').innerText = `Welcome, ${name}!`;
    showScreen('menu');
}

function logout() { currentUser = null; showScreen('login'); }
function saveUser() {
    let accounts = JSON.parse(localStorage.getItem('ic_accounts')) || {};
    accounts[currentUser.name] = currentUser.data;
    localStorage.setItem('ic_accounts', JSON.stringify(accounts));
}

// --- DECK BUILDER ---
function openDeckBuilder() {
    builderDeck = [...currentUser.data.deck];
    renderBuilder();
    showScreen('builder');
}
function renderBuilder() {
    const pool = document.getElementById('pool-list');
    const deck = document.getElementById('deck-list');
    pool.innerHTML = ''; deck.innerHTML = '';
    
    Object.keys(DB).forEach(id => {
        let div = document.createElement('div');
        div.innerHTML = `${DB[id].ico} ${DB[id].nm} <button style="float:right;background:#4c1d95;color:#fff;border:none;padding:2px 5px;border-radius:3px;" onclick="builderDeck.push('${id}');renderBuilder()">Add</button>`;
        div.style.padding = "5px"; div.style.borderBottom = "1px solid #333";
        pool.appendChild(div);
    });

    builderDeck.forEach((id, idx) => {
        let div = document.createElement('div');
        div.innerHTML = `${DB[id].ico} ${DB[id].nm} <button style="float:right;background:#dc2626;color:#fff;border:none;padding:2px 5px;border-radius:3px;" onclick="builderDeck.splice(${idx},1);renderBuilder()">Del</button>`;
        div.style.padding = "5px"; div.style.borderBottom = "1px solid #333";
        deck.appendChild(div);
    });
    document.getElementById('deck-count').innerText = builderDeck.length;
}
function saveDeck() {
    if(builderDeck.length < 5) return alert("Deck needs at least 5 cards.");
    currentUser.data.deck = builderDeck;
    saveUser();
    showScreen('menu');
}

// --- GAME ENGINE ---
function startGame() {
    G = {
        phase: 'DRAW',
        turnPlayer: 'p',
        selectedCardIndex: null, // For hand
        attackerPos: null, // For field
        p: { hp: 8000, mhp: 8000, deck: shuffle([...currentUser.data.deck]), hand: [], front: [null,null,null,null], back: [null,null,null,null], grave: [], banish: [] },
        e: { hp: 8000, mhp: 8000, deck: shuffle(Object.keys(DB).flatMap(k=>[k,k]).slice(0,25)), hand: [], front: [null,null,null,null], back: [null,null,null,null], grave: [], banish: [] }
    };
    
    // Initial Draw
    for(let i=0; i<4; i++) { drawCard('p'); drawCard('e'); }
    showScreen('game');
    updateBoard();
    updatePhaseButton();
    log("Duel Started! Your turn.");
}

function shuffle(arr) { for(let i=arr.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i], arr[j]]=[arr[j], arr[i]]; } return arr; }

function drawCard(side) {
    if (G[side].deck.length === 0) {
        log(side === 'p' ? "You decked out! YOU LOSE!" : "Enemy decked out! YOU WIN!");
        setTimeout(() => showScreen('menu'), 3000);
        return false;
    }
    const id = G[side].deck.pop();
    G[side].hand.push({ ...DB[id], instId: Math.random(), curHp: DB[id].hp, attacked: false });
    return true;
}

function progressTurn() {
    if(G.turnPlayer !== 'p') return;
    
    if(G.phase === 'DRAW') {
        drawCard('p');
        G.phase = 'MAIN';
        log("Main Phase: Play cards from hand.");
    } else if(G.phase === 'MAIN') {
        G.phase = 'BATTLE';
        log("Battle Phase: Tap a Front Row warrior, then tap an enemy to attack.");
    } else if(G.phase === 'BATTLE') {
        G.phase = 'END';
        endTurn();
    }
    updatePhaseButton();
    updateBoard();
}

function updatePhaseButton() {
    const btn = document.getElementById('btn-main');
    if(G.turnPlayer !== 'p') { btn.innerText = "Enemy Turn..."; btn.style.background = "#555"; return; }
    btn.style.background = "linear-gradient(135deg,#4f0ba8,#7c3aed)";
    if(G.phase === 'DRAW') btn.innerText = "Draw Card";
    if(G.phase === 'MAIN') btn.innerText = "To Battle Phase";
    if(G.phase === 'BATTLE') btn.innerText = "End Turn";
}

function act(owner, row, idx) {
    if(G.turnPlayer !== 'p') return;

    // 1. MAIN PHASE: Place cards from hand
    if(G.phase === 'MAIN' && owner === 'p') {
        if(G.selectedCardIndex === null) return toast("Select a card from your hand first.");
        const card = G.p.hand[G.selectedCardIndex];
        
        if(card.type === 'spell') return toast("Spells activate from hand, just tap them again.");
        if(G.p[row][idx] !== null) return toast("Slot is occupied.");
        
        G.p[row][idx] = card;
        G.p.hand.splice(G.selectedCardIndex, 1);
        G.selectedCardIndex = null;
        toast(`Summoned ${card.nm} to ${row} row.`);
        updateBoard();
        return;
    }

    // 2. BATTLE PHASE: Attack logic
    if(G.phase === 'BATTLE') {
        // Select attacker
        if(owner === 'p' && G.p[row][idx] !== null) {
            const card = G.p[row][idx];
            if(card.type !== 'warrior') return toast("Only warriors can attack.");
            if(card.attacked) return toast("Already attacked this turn.");
            G.attackerPos = {row, idx};
            toast(`${card.nm} ready to attack! Tap target.`);
            return;
        }

        // Select target
        if(owner === 'e' && G.attackerPos) {
            const attacker = G.p[G.attackerPos.row][G.attackerPos.idx];
            
            // Check Front Row Protection
            if(row === 'back' && !attacker.pierce) {
                const enemyFrontHasCards = G.e.front.some(c => c !== null);
                if(enemyFrontHasCards) return toast("Front row protects the back row! Use a PIERCE card to bypass.");
            }

            const target = G.e[row][idx];
            if(target) {
                target.curHp -= attacker.atk;
                log(`${attacker.nm} hits ${target.nm} for ${attacker.atk}!`);
                if(target.curHp <= 0) {
                    toast("Enemy destroyed!");
                    G.e.grave.push(target);
                    G.e[row][idx] = null;
                }
            } else {
                // Direct Attack if front is empty
                const enemyFrontHasCards = G.e.front.some(c => c !== null);
                if(enemyFrontHasCards && !attacker.pierce) return toast("Must destroy front row before direct attack.");
                G.e.hp -= attacker.atk;
                log(`Direct Attack! Enemy takes ${attacker.atk} damage!`);
            }

            attacker.attacked = true;
            G.attackerPos = null;
            checkWinState();
            updateBoard();
        }
    }
}

function selectHandCard(idx) {
    if(G.phase !== 'MAIN' || G.turnPlayer !== 'p') return;
    const card = G.p.hand[idx];
    
    // Play spell immediately
    if(card.type === 'spell') {
        if(card.id === 'heal_spell') G.p.hp = Math.min(G.p.mhp, G.p.hp + 1500);
        if(card.id === 'fireball') G.e.hp -= 800;
        toast(`Cast ${card.nm}!`);
        G.p.grave.push(card);
        G.p.hand.splice(idx, 1);
        G.selectedCardIndex = null;
        checkWinState();
        updateBoard();
        return;
    }

    // Select warrior to place
    if(G.selectedCardIndex === idx) {
        G.selectedCardIndex = null; // deselect
    } else {
        G.selectedCardIndex = idx;
        toast(`Selected ${card.nm}. Tap an empty field slot.`);
    }
    updateBoard();
}

function checkWinState() {
    if(G.e.hp <= 0) { alert("VICTORY! Enemy HP depleted."); showScreen('menu'); return true;}
    if(G.p.hp <= 0) { alert("DEFEAT! Your HP depleted."); showScreen('menu'); return true;}
    return false;
}

function endTurn() {
    G.turnPlayer = 'e';
    // Reset attacked status
    ['front', 'back'].forEach(r => G.p[r].forEach(c => {if(c) c.attacked = false;}));
    updatePhaseButton();
    updateBoard();
    
    // Very Basic Enemy AI
    setTimeout(() => {
        if(!drawCard('e')) return;
        updateBoard();
        log("Enemy turn...");
        
        setTimeout(() => {
            // AI Play random warrior to front
            const wIdx = G.e.hand.findIndex(c => c.type === 'warrior');
            if(wIdx !== -1) {
                const emptyIdx = G.e.front.findIndex(c => c === null);
                if(emptyIdx !== -1) {
                    G.e.front[emptyIdx] = G.e.hand[wIdx];
                    G.e.hand.splice(wIdx, 1);
                    log("Enemy summons to Front Row.");
                }
            }
            updateBoard();

            setTimeout(() => {
                // AI Attack
                G.e.front.forEach(c => {
                    if(c && !c.attacked) {
                        const pTargetIdx = G.p.front.findIndex(pc => pc !== null);
                        if(pTargetIdx !== -1) {
                            const pt = G.p.front[pTargetIdx];
                            pt.curHp -= c.atk;
                            log(`Enemy ${c.nm} hits ${pt.nm} for ${c.atk}`);
                            if(pt.curHp <= 0) { G.p.grave.push(pt); G.p.front[pTargetIdx] = null; }
                        } else {
                            G.p.hp -= c.atk;
                            log(`Enemy ${c.nm} attacks directly for ${c.atk}`);
                        }
                        c.attacked = true;
                    }
                });
                
                ['front', 'back'].forEach(r => G.e[r].forEach(c => {if(c) c.attacked = false;}));
                checkWinState();
                G.turnPlayer = 'p';
                G.phase = 'DRAW';
                updatePhaseButton();
                updateBoard();
                log("Your turn! Draw Phase.");
            }, 1000);
        }, 1000);
    }, 1000);
}

function showGraveyard() {
    const list = document.getElementById('grave-list');
    list.innerHTML = `<b>Your Grave:</b> ${G.p.grave.length > 0 ? G.p.grave.map(c=>c.nm).join(', ') : 'Empty'}<br><br>
                      <b>Enemy Grave:</b> ${G.e.grave.length > 0 ? G.e.grave.map(c=>c.nm).join(', ') : 'Empty'}`;
    document.getElementById('modal-grave').classList.add('active');
}

// --- RENDER ---
function updateBoard() {
    // Top Info
    document.getElementById('p-deck-count').innerText = G.p.deck.length;
    document.getElementById('e-deck-count').innerText = G.e.deck.length;
    document.getElementById('p-hp-fill').style.width = Math.max(0, (G.p.hp / G.p.mhp) * 100) + "%";
    document.getElementById('e-hp-fill').style.width = Math.max(0, (G.e.hp / G.e.mhp) * 100) + "%";
    document.getElementById('p-hp-txt').innerText = `${G.p.hp}/${G.p.mhp}`;
    document.getElementById('e-hp-txt').innerText = `${G.e.hp}/${G.e.mhp}`;

    // Field
    ['p', 'e'].forEach(player => {
        ['front', 'back'].forEach(row => {
            const container = document.getElementById(`${player}-${row}`);
            Array.from(container.children).forEach((slot, idx) => {
                const card = G[player][row][idx];
                slot.innerHTML = card ? `<div class="card"><div class="title">${card.nm}</div><div class="icon">${card.ico}</div><div class="stats"><span>⚔${card.atk}</span><span>♥${card.curHp}</span></div></div>` : '';
            });
        });
    });

    // Hand
    const handDiv = document.getElementById('p-hand');
    handDiv.innerHTML = '';
    G.p.hand.forEach((card, idx) => {
        let div = document.createElement('div');
        div.className = 'card hand-card';
        if(G.selectedCardIndex === idx) div.style.transform = "translateY(-10px)";
        div.innerHTML = `<div class="title">${card.nm}</div><div class="icon">${card.ico}</div><div class="stats"><span>${card.type==='warrior'?'⚔'+card.atk:'Spell'}</span></div>`;
        div.onclick = () => selectHandCard(idx);
        handDiv.appendChild(div);
    });
}

// --- UTILS ---
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(`screen-${id}`).classList.add('active');
}

function toast(msg) {
    const box = document.createElement('div');
    box.className = 'toast'; box.innerText = msg;
    document.getElementById('toast-container').appendChild(box);
    setTimeout(() => box.remove(), 2000);
}

function log(msg) { document.getElementById('logline').innerText = msg; }
</script>
</body>
</html>
